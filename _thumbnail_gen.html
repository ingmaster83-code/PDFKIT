<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700&display=swap" rel="stylesheet">
<meta name="robots" content="noindex, nofollow">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { width: 240px; height: 240px; overflow: hidden; }
  .card {
    width: 240px;
    height: 240px;
    background: linear-gradient(135deg, #FF4444 0%, #cc2222 100%);
    border-radius: 40px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 4px;
  }
  .icon {
    font-size: 52px;
    line-height: 1;
    margin-bottom: 6px;
  }
  .brand {
    font-family: Arial Black, Arial, sans-serif;
    font-size: 42px;
    font-weight: 900;
    color: white;
    letter-spacing: -1px;
    line-height: 1;
  }
  .tagline {
    font-family: Arial, sans-serif;
    font-size: 13px;
    font-weight: 600;
    color: rgba(255,255,255,0.85);
    letter-spacing: 0.5px;
    margin-top: 4px;
  }
</style>
  <link rel="alternate" hreflang="ko" href="https://pdfkit.wooahouse.com/_thumbnail_gen.html">
</head>
<body>
  <div class="card">
    <div class="icon">📄</div>
    <div class="brand">WooaPDF</div>
    <div class="tagline">Free PDF Tools</div>
  </div>
<footer class="footer"></footer>
<script src="js/wooa-sidebar.js"></script>
<script src="js/wooa-footer.js"></script>
</body>
</html>
