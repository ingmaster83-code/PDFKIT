<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PDF 워터마크 추가 무료 - 텍스트 도장 삽입 | PDF킷</title>
  <meta name="description" content="PDF에 CONFIDENTIAL, 사본, 샘플 등 워터마크 텍스트를 무료로 삽입. 위치, 색상, 투명도 설정 가능. 한글 워터마크 지원.">
  <meta name="keywords" content="PDF워터마크, PDF도장, PDF사본표시, PDF기밀표시, PDF텍스트삽입, PDF워터마크추가, PDF도장찍기, PDF사본, PDF기밀">
  <link rel="canonical" href="https://pdfkit.wooahouse.com/watermark-pdf.html">
  <meta property="og:title" content="PDF 워터마크 추가 무료 - 도장·사본 표시 삽입 | PDF킷">
  <meta property="og:description" content="PDF에 워터마크 무료 삽입. 위치·색상·투명도 설정 가능, 한글 지원.">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://pdfkit.wooahouse.com/watermark-pdf.html">
  <meta property="og:locale" content="ko_KR">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<header>
  <div class="header-inner">
    <a href="index.html" class="logo">PDF킷 <span>| PDFkit</span></a>
    <nav>
      <a href="pdf-to-jpg.html">PDF→이미지</a>
      <a href="jpg-to-pdf.html">이미지→PDF</a>
      <a href="merge-pdf.html">PDF 병합</a>
      <a href="split-pdf.html">PDF 분할</a>
      <a href="compress-pdf.html">PDF 압축</a>
      <a href="index.html">전체 도구 ›</a>
    </nav>
  </div>
</header>

<main class="tool-page">

  <div class="breadcrumb">
    <a href="index.html">🏠 홈</a>
    <span>›</span>
    <span>워터마크 추가</span>
  </div>

  <div class="tool-header">
    <span class="tool-header-icon">💧</span>
    <h1>PDF 워터마크 추가</h1>
    <p>PDF 페이지에 텍스트 워터마크를 삽입합니다.</p>
  </div>

  <div class="drop-zone" id="dropZone">
    <span class="drop-zone-icon">📂</span>
    <h3>PDF 파일을 여기에 끌어다 놓으세요</h3>
    <p>워터마크를 추가할 PDF를 업로드하세요</p>
    <button class="btn-select" onclick="document.getElementById('fileInput').click()">PDF 파일 선택</button>
    <input type="file" id="fileInput" accept=".pdf" style="display:none">
  </div>

  <div id="fileInfoPanel" class="file-list-panel" style="display:none">
    <div class="file-list-title">선택된 파일</div>
    <div id="fileInfo"></div>
  </div>

  <div id="optionsPanel" class="options-panel" style="display:none">
    <div class="options-title">워터마크 설정</div>

    <div class="option-row">
      <span class="option-label">워터마크 텍스트</span>
      <div class="option-control">
        <input type="text" id="wmText" placeholder="예: CONFIDENTIAL, 사본, 샘플" value="SAMPLE">
      </div>
    </div>

    <div class="option-row">
      <span class="option-label">글자 크기</span>
      <div class="option-control">
        <div class="radio-group">
          <label class="radio-item"><input type="radio" name="wmSize" value="small"> 소</label>
          <label class="radio-item"><input type="radio" name="wmSize" value="medium" checked> 중</label>
          <label class="radio-item"><input type="radio" name="wmSize" value="large"> 대</label>
        </div>
      </div>
    </div>

    <div class="option-row">
      <span class="option-label">색상</span>
      <div class="option-control">
        <div class="radio-group" style="flex-wrap:wrap; gap:10px;">
          <label class="radio-item"><input type="radio" name="wmColor" value="#DD0000" checked> <span style="color:#DD0000; font-weight:600;">빨강</span></label>
          <label class="radio-item"><input type="radio" name="wmColor" value="#888888"> <span style="color:#888; font-weight:600;">회색</span></label>
          <label class="radio-item"><input type="radio" name="wmColor" value="#1155CC"> <span style="color:#1155CC; font-weight:600;">파랑</span></label>
          <label class="radio-item"><input type="radio" name="wmColor" value="#111111"> <span style="font-weight:600;">검정</span></label>
        </div>
      </div>
    </div>

    <div class="option-row">
      <span class="option-label">투명도</span>
      <div class="option-control">
        <select id="wmOpacity">
          <option value="0.10">10% (매우 연하게)</option>
          <option value="0.20" selected>20%</option>
          <option value="0.30">30%</option>
          <option value="0.40">40%</option>
          <option value="0.50">50% (진하게)</option>
        </select>
      </div>
    </div>

    <div class="option-row">
      <span class="option-label">위치</span>
      <div class="option-control">
        <select id="wmPosition">
          <option value="diagonal">중앙 대각선 (45°) — 권장</option>
          <option value="center">중앙 수평</option>
          <option value="bottom-left">왼쪽 하단</option>
          <option value="bottom-right">오른쪽 하단</option>
        </select>
      </div>
    </div>

    <div class="option-row">
      <span class="option-label">적용 페이지</span>
      <div class="option-control">
        <div class="radio-group" style="flex-direction:column; gap:8px;">
          <label class="radio-item"><input type="radio" name="wmPages" value="all" checked> 전체 페이지</label>
          <label class="radio-item"><input type="radio" name="wmPages" value="custom"> 특정 페이지만</label>
        </div>
      </div>
    </div>

    <div id="customPagesRow" class="option-row" style="display:none">
      <span class="option-label">페이지 번호</span>
      <div class="option-control">
        <input type="text" id="wmPageInput" placeholder="예: 1,3,5-8">
      </div>
    </div>

    <button class="btn-convert" id="applyBtn">💧 워터마크 추가</button>
  </div>

  <div id="errorMsg" class="alert alert-error" style="display:none"></div>

  <div class="progress-wrap" id="progressWrap">
    <div class="progress-label">
      <span id="progressText">처리 중...</span>
      <span id="progressPct">0%</span>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
  </div>

  <div class="result-panel" id="resultPanel">
    <div class="result-header">
      <span class="result-icon">✅</span>
      <div>
        <div class="result-title">워터마크 추가 완료!</div>
        <div class="result-subtitle" id="resultSubtitle"></div>
      </div>
    </div>
    <button class="btn-download" id="downloadBtn">⬇️ PDF 다운로드</button>
  </div>

</main>

<footer>
  <div class="footer-inner">
    <div class="footer-bottom">
      <p>© 2024 PDF킷. 모든 권리 보유.</p>
      <div class="footer-bottom-links">
        <a href="privacy.html">개인정보처리방침</a>
        <a href="about.html">소개</a>
      </div>
    </div>
  </div>
</footer>

<script src="https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
<script>
  let selectedFile = null;
  let totalPages = 0;
  let resultBytes = null;

  const dropZone = document.getElementById('dropZone');
  dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('drag-over'); });
  dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
  dropZone.addEventListener('drop', e => {
    e.preventDefault(); dropZone.classList.remove('drag-over');
    const file = e.dataTransfer.files[0];
    if (file) loadFile(file);
  });
  document.getElementById('fileInput').addEventListener('change', e => {
    if (e.target.files[0]) loadFile(e.target.files[0]);
  });

  document.querySelectorAll('input[name="wmPages"]').forEach(r => {
    r.addEventListener('change', () => {
      document.getElementById('customPagesRow').style.display = r.value === 'custom' ? 'flex' : 'none';
    });
  });

  async function loadFile(file) {
    if (!file.name.endsWith('.pdf') && file.type !== 'application/pdf') {
      showError('PDF 파일만 업로드할 수 있습니다.'); return;
    }
    hideError();
    selectedFile = file;
    resultBytes = null;
    try {
      const { PDFDocument } = PDFLib;
      const buf = await file.arrayBuffer();
      const doc = await PDFDocument.load(buf, { ignoreEncryption: true });
      totalPages = doc.getPageCount();
    } catch(e) { totalPages = 0; }

    document.getElementById('fileInfo').innerHTML = `
      <div class="file-item">
        <span class="file-item-icon">📄</span>
        <div class="file-item-info">
          <div class="file-item-name">${file.name}</div>
          <div class="file-item-size">${formatSize(file.size)} · ${totalPages}페이지</div>
        </div>
        <button class="file-item-remove" onclick="clearFile()">✕</button>
      </div>`;
    document.getElementById('fileInfoPanel').style.display = 'block';
    document.getElementById('optionsPanel').style.display = 'block';
    document.getElementById('resultPanel').style.display = 'none';
  }

  function clearFile() {
    selectedFile = null;
    document.getElementById('fileInfoPanel').style.display = 'none';
    document.getElementById('optionsPanel').style.display = 'none';
    document.getElementById('resultPanel').style.display = 'none';
    document.getElementById('progressWrap').style.display = 'none';
    document.getElementById('fileInput').value = '';
    hideError();
  }

  document.getElementById('applyBtn').addEventListener('click', async () => {
    if (!selectedFile) return;
    const text = document.getElementById('wmText').value.trim();
    if (!text) { showError('워터마크 텍스트를 입력해 주세요.'); return; }

    const sizeMap = { small: 55, medium: 85, large: 115 };
    const fontSize = sizeMap[document.querySelector('input[name="wmSize"]:checked').value];
    const color = document.querySelector('input[name="wmColor"]:checked').value;
    const opacity = parseFloat(document.getElementById('wmOpacity').value);
    const position = document.getElementById('wmPosition').value;
    const pagesMode = document.querySelector('input[name="wmPages"]:checked').value;
    const customInput = document.getElementById('wmPageInput').value;

    const btn = document.getElementById('applyBtn');
    btn.disabled = true; btn.textContent = '⏳ 처리 중...';
    hideError(); resultBytes = null;
    document.getElementById('progressWrap').style.display = 'block';
    document.getElementById('resultPanel').style.display = 'none';

    try {
      // 워터마크 캔버스 생성 (한글 포함 모든 텍스트 지원)
      const wm = document.createElement('canvas');
      wm.width = 1200; wm.height = 320;
      const ctx = wm.getContext('2d');
      ctx.clearRect(0, 0, 1200, 320);
      ctx.font = `bold ${fontSize}px 'Malgun Gothic', 'Apple SD Gothic Neo', 'Noto Sans KR', Arial, sans-serif`;
      ctx.fillStyle = color;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(text, 600, 160);

      const dataUrl = wm.toDataURL('image/png');
      const base64 = dataUrl.split(',')[1];
      const imgBytes = Uint8Array.from(atob(base64), c => c.charCodeAt(0));

      updateProgressUI(20, '워터마크 이미지 생성 중...');

      const { PDFDocument, degrees } = PDFLib;
      const arrayBuffer = await selectedFile.arrayBuffer();
      const pdfDoc = await PDFDocument.load(arrayBuffer);
      const pages = pdfDoc.getPages();
      const wmImage = await pdfDoc.embedPng(imgBytes);

      updateProgressUI(40, '워터마크 삽입 중...');

      let targetPages;
      if (pagesMode === 'all') {
        targetPages = pages.map((_, i) => i + 1);
      } else {
        targetPages = parsePageList(customInput, totalPages);
        if (targetPages.length === 0) {
          showError('올바른 페이지 번호를 입력해 주세요.');
          resetBtn(btn); return;
        }
      }

      targetPages.forEach(pageNum => {
        const page = pages[pageNum - 1];
        if (!page) return;
        const { width, height } = page.getSize();
        const wmW = width * 0.68;
        const wmH = wmW * (320 / 1200);
        let x = (width - wmW) / 2;
        let y = (height - wmH) / 2;
        let rotate = degrees(0);

        if (position === 'diagonal') {
          rotate = degrees(45);
        } else if (position === 'bottom-left') {
          x = 30; y = 25;
        } else if (position === 'bottom-right') {
          x = width - wmW - 30; y = 25;
        }
        page.drawImage(wmImage, { x, y, width: wmW, height: wmH, opacity, rotate });
      });

      updateProgressUI(85, 'PDF 저장 중...');
      resultBytes = await pdfDoc.save();
      updateProgressUI(100, '완료!');
      document.getElementById('progressWrap').style.display = 'none';

      const panel = document.getElementById('resultPanel');
      panel.style.display = 'block';
      document.getElementById('resultSubtitle').textContent =
        `${targetPages.length}개 페이지에 워터마크가 추가되었습니다`;
      panel.scrollIntoView({ behavior: 'smooth' });

    } catch(err) {
      console.error(err);
      showError('처리 중 오류가 발생했습니다: ' + err.message);
      document.getElementById('progressWrap').style.display = 'none';
    }
    resetBtn(btn);
  });

  document.getElementById('downloadBtn').addEventListener('click', () => {
    if (!resultBytes) return;
    const blob = new Blob([resultBytes], { type: 'application/pdf' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = selectedFile.name.replace('.pdf', '_watermarked.pdf');
    a.click();
    URL.revokeObjectURL(url);
  });

  function parsePageList(input, total) {
    const pages = new Set();
    input.split(',').forEach(part => {
      part = part.trim();
      if (part.includes('-')) {
        const [s, e] = part.split('-').map(Number);
        for (let i = Math.max(1, s); i <= Math.min(total, e); i++) pages.add(i);
      } else {
        const n = parseInt(part);
        if (!isNaN(n) && n >= 1 && n <= total) pages.add(n);
      }
    });
    return [...pages].sort((a, b) => a - b);
  }

  function updateProgressUI(pct, text) {
    document.getElementById('progressFill').style.width = pct + '%';
    document.getElementById('progressText').textContent = text;
    document.getElementById('progressPct').textContent = pct + '%';
  }
  function resetBtn(btn) { btn.disabled = false; btn.textContent = '💧 워터마크 추가'; }
  function showError(msg) { const el = document.getElementById('errorMsg'); el.textContent = msg; el.style.display = 'block'; }
  function hideError() { document.getElementById('errorMsg').style.display = 'none'; }
  function formatSize(b) {
    if (b < 1024) return b + ' B';
    if (b < 1024*1024) return (b/1024).toFixed(1) + ' KB';
    return (b/(1024*1024)).toFixed(1) + ' MB';
  }
</script>

</body>
</html>
